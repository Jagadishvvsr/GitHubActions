name: aws_oidc
on:
    workflow_dispatch
jobs:
    aws:
        runs-on: ubuntu-latest
        permissions:
            id-token: write
        steps:
            - name: checkout
              uses: actions/checkout@v6

            - name: configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v6.1.0
              with:
                role-to-assume: arn:aws:iam::891612582498:role/S3PermissionsforGitHubID
                aws-region: us-east-1
            - name: copy minimal node to s3
              run: |
                aws s3 cp ../../minimalproject s3://github-jagadishvvsr.artifacts
        
