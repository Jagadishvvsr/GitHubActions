name: container-run
on:
    workflow_dispatch:
jobs:
    first-job:
        runs-on: ubuntu-latest
        container:
            image: node:18
            env:
                NODE_ENV: development
            ports:
                - 80
            volumes:
                - mydocker_volume:/volume_mount
            options: --cpus 1
        steps:
            - name: check the dockerfilenev file
              run: (ls /.dockerenv && echo Found dockerenv) || (echo No dockerenv)
            