name: cache
on:
    workflow_dispatch:
jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
        - name: Restore cache
          id: demo-cache
          uses: actions/cache@638ed79f9dc94c1de1baef91bcab5edaa19451f4 # v4.2.4
          with:
            path: demo-cache
            key: demo-cache-v1
        
        - name: populating data
          if: steps.demo-cache.outputs.cache-hit != 'true'
          run: |
            echo "Creating cache"
            mkdir -p demo-cache
            date > demo-cache/timestamp.txt

        - name: Save Cache
          uses: actions/cache@638ed79f9dc94c1de1baef91bcab5edaa19451f4 # v4.2.4
          with:
                path: demo-cache
                key: demo-cache-v1
        
        - name: Verify Cache
          run: |
            echo "Cache hit ?: ${{ steps.demo-cache.outputs.cache-hit}}"
            cat demo-cache/timestamp.txt


  cache-with-node:
      name: npm-cache
      runs-on: ubuntu-latest
      defaults: 
          run:
            working-directory: minimalproject/
      steps:
        - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493 # v5.0.0
        - uses: actions/setup-node@d7a11313b581b306c961b506cfc8971208bb03f6 # v4.4.0
          with:
            node-version: 24
            cache: 'npm'
            cache-dependency-path: 'minimalproject/package-lock.json'

        - name: install dependencies
          run: npm ci --prefer-offline --no-audit
          
        - name:  List first few modules
          run: ls -R node_modules | head





        