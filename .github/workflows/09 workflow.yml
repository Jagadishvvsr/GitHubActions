name: cache
on:
    workflow_dispatch:
jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
        - name: Restore cache
          id: demo-cache
          uses: actions/cache@638ed79f9dc94c1de1baef91bcab5edaa19451f4 # v4.2.4
          with:
            path: demo-cache
            key: demo-cache-v1
        
        - name: populating data
          if: steps.demo-cache.outputs.cache-hit != 'true'
          run: |
            echo "Creating cache"
            mkdir -p demo-cache
            date > demo-cache/timestamp.txt

        - name: Save Cache
          uses: actions/cache@638ed79f9dc94c1de1baef91bcab5edaa19451f4 # v4.2.4
          with:
                path: demo-cache
                key: demo-cache-v1
        
        - name: Verify Cache
          run: |
            echo "Cache hit ?: ${{ steps.demo-cache.outputs.cache-hit}}"
            cat demo-cache/timestamp.txt


        